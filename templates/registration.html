{% extends "layout.html" %}

{% block title %}Register — FlaskApp{% endblock %}

{% block main_class %}narrow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join us — it only takes a minute</p>
        </div>

        <div class="app-card">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="name"
                            name="name"
                            class="form-control-app"
                            placeholder="John Doe"
                            required
                            autocomplete="name"
                        >
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control-app"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                        <i class="bi bi-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control-app"
                            placeholder="Create a strong password"
                            required
                            autocomplete="new-password"
                        >
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-app btn-primary-app btn-submit">
                    <i class="bi bi-person-check-fill"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account?
                <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
